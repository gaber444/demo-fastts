name: Build FastTS release assets

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "cp*-win32 *-musllinux_*"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "universal2"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: List wheel files
        shell: bash
        run: |
          ls wheelhouse

      - name: Package wheels by OS
        shell: bash
        run: |
          mkdir -p release-assets

          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            zip -j release-assets/fastts-macos-wheels.zip wheelhouse/*.whl
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a release-assets/fastts-windows-wheels.zip wheelhouse/*.whl
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            zip -j release-assets/fastts-ubuntu-wheels.zip wheelhouse/*.whl
          fi

      - name: Upload OS wheel bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip