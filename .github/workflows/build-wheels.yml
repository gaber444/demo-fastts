name: Build wheels

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel

      - name: Build wheels
        env:
          # Build CPython 3.8–3.12 on all platforms
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          # Skip 32-bit Windows wheels and musllinux (Alpine) wheels
          CIBW_SKIP: "cp*-win32 *-musllinux_*"
          # On Windows, only build AMD64 (64-bit), not x86
          CIBW_ARCHS_WINDOWS: "AMD64"
          # macOS: universal2 (Intel + ARM in one wheel)
          CIBW_ARCHS_MACOS: "universal2"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v6
        with:
          name: fastts-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
